name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Run unit tests with coverage
        run: pytest -m unit --cov=src --cov-report=xml --cov-report=json --cov-report=term -v
      - name: Enforce per-file coverage (>= 90%)
        run: python scripts/check_per_file_coverage.py --threshold 90
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # Integration tests: independent project that consumes llm-gateway as a dependency
  integration-test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install llm-gateway from checkout
        run: uv pip install . --system
      - name: Install integration test dependencies
        run: uv pip install pytest "pytest-asyncio>=0.24" "pydantic>=2.0" --system
      - name: Verify llm-gateway is installed as a package
        run: python -c "from llm_gateway import LLMClient, GatewayConfig; print('OK')"
      - name: Run integration tests (dry-run)
        working-directory: integration_tests
        run: python -m pytest -m dry_run -v

  # Test with minimal dependencies (no optional extras)
  test-minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install core only
        run: uv pip install -e "." --system && uv pip install pytest pytest-asyncio --system
      - name: Test import
        run: python -c "from llm_gateway import LLMClient, GatewayConfig; print('OK')"
